# Publica o app no GitHub Pages a cada push na branch principal.
# Pré-requisitos no repositório: Settings → Pages → Source = "GitHub Actions".
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch: # permite rodar manualmente pela aba Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Evita execuções concorrentes de deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
